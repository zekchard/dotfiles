format = '''
$username$time$directory$git_branch$rust$python
$character
'''
right_format = '''
$status $cmd_duration 
'''

scan_timeout = 60
palette = 'matugen'

# Prompt symbols 
[character]
success_symbol = "[ 󰅂](tertiary bold)"
error_symbol = "[ 󰅂](error)"
vicmd_symbol = "[󰅂](#f9e2af)"

[username]
format = "[ $user](bg:primary fg:on_primary bold)[](fg:primary bg:surface_container)"
show_always = true

[time]
format = "[ $time ](fg:color3 bg:surface_container)"
disabled = false
time_format = "%I:%M %p"

[directory]
format = "[](fg:secondary bg:surface_container)[](bg:secondary fg:on_primary)[ ](fg:secondary bg:surface_container)[$path](fg:color3 bg:surface_container)[ ](fg:surface_container)"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
format = "[](fg:tertiary bg:surface_container)[󰊢](bg:tertiary fg:on_primary)[](fg:tertiary bg:surface_container)[(bg:tertiary fg:on_primary) $branch](fg:color3 bg:surface_container)[](fg:surface_container) "

[python]
format = "[](fg:tertiary bg:surface_container)[${symbol}${version}](bg:tertiary fg:on_primary)[](fg:tertiary bg:surface_container)[(bg:tertiary fg:on_primary)( ${virtualenv})](fg:color3 bg:surface_container)[](fg:surface_container) "
symbol = '🐍'
# pyenv_version_name = true
pyenv_prefix = 'venv'


[cmd_duration]
min_time = 250
show_milliseconds = true
format = '[$duration ](fg:secondary bold)'

[status]
disabled = false
format = '[$int $symbol]($style)'
signal_symbol = ''
sigint_symbol = '󰟾'
not_found_symbol = '󰦀'
not_executable_symbol = ''
symbol = ''
success_style = 'primary bold'
failure_style = 'error bold'

[palettes.matugen]
<* for name, value in colors *>
{{name}} = '{{value.default.hex}}'
<* endfor *>
