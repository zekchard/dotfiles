[config]

[config.wallpaper]
# Whether to set the wallpaper or not
set = false

# Modified colors.css to take RGB values instead for me to modify its transparency in the configs

# The base command to run for applying the wallpaper.
# Keywords like {{ image }} or anything that works inside of hooks works here.
# You could also set a static color if you use the color keywords and the wallpaper setter supports it.
command = "awww img --transition-type center '{{ image }}'"

[templates.currentcolor]
input_path = '~/.config/matugen/templates/current'
output_path = '~/.config/matugen/current-color'
post_hook = 'magick "/home/zek/.config/fastfetch/wriorindeffbase.png" -gamma 2.5 -fill "{{colors.primary.default.hex}}" -tint 50 /home/zek/.config/fastfetch/wriorindeffcolored.png'

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.lua'
output_path = '~/.config/hypr/colors.lua'
post_hook = 'hyprctl reload'

[templates.hyprland-legacy]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload'

[templates.waybar]
input_path = '~/.config/matugen/colors.css'
output_path = '~/.config/waybar/colors.css'

[templates.wofi]
input_path = '~/.config/matugen/colors.css'
output_path = '~/.config/wofi/colors.css'

#[templates.alacritty]
#input_path = '~/.config/matugen/templates/alacritty.toml'
#output_path = '~/.config/alacritty/colors.toml'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
# post hook causes some problems for gtk4...
# post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
