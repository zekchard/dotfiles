# ...until i found something better - Universal terminal colors and a good color palette for them (from https://github.com/InioX/matugen-themes/pull/132)
[templates.term-colors]
input_path = "~/.config/matugen/templates/term-colors.json"
output_path = "~/.cache/matugen/term-colors.json"
post_hook = "python ~/.config/matugen/post-hook-scripts/generate-term-colors.py ~/.cache/matugen/term-colors.json"

