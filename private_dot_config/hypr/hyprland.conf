
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

debug:disable_logs = true

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1,1366x0,auto,1
monitor = HDMI-A-1,1280x1024,-1280x0,1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$fileManager = nautilus
$menu = wofi --show drun
$browser = waterfox
# $menu = tofi-drun --drun-launch=true

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once = hyprsunset
exec-once = wlsunset -l 13.6 -L 121.1 -t 3700
exec-once = hyprpaper
exec-once = alacritty
exec-once = waybar
exec-once = hyprctl setcursor Posy_Cursor_Black 20
exec-once = nm-applet --indicator
exec-once = jamesdsp -t 
exec-once = blueberry-tray
exec-once = udiskie --tray
exec-once = hypridle
exec-once = dunst
exec-once = swayosd-server
exec-once = wl-paste --watch cliphist store 
exec-once = cliphist wipe
exec-once = systemctl --user start hyprpolkitagent
exec-once = batsignal -b -p -e -m 5 -w 20 -c 10 -d 5 -W 'Battery is at 20%, consider charging' -C 'Battery is at 10%, consider charging' -P 'Battery is charging' -U 'Battery is disconnected from power source' -M dunstify
exec-once = pano-scrobbler -m
exec-once = kdeconnectd && kdeconnect-indicator

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20
env = TERM,alacritty
env = TERMINAL,alacritty
env = EDITOR,micro
env = OCL_ICD_VENDORS,/etc/OpenCL/vendors/amdocl64.icd
env = QT_QPA_PLATFORMTHEME,qt6ct
env = BROWSER,waterfox

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 5

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(7E57C2ee) rgba(9575CDee) 270deg
    col.inactive_border = rgba(212121bb)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 2.5

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        sharp = false
        range = 8
        render_power = 2
        color = rgba(1a1a1add)
        color_inactive = rgba(1a1a1abb)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        xray = true
        passes = 2
        noise = 0.1
        contrast = 2
        brightness = 0.8172
        vibrancy_darkness = 0.0
        vibrancy = 0.0
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes
    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
	bezier = easeInOutQuint,0.83, 0, 0.17, 1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    bezier = easeInOutExpo,0.87, 0, 0.13, 1
    bezier = easeOutExpo,0.16, 1, 0.3, 1
    bezier = easeInOutCirc,0.85, 0, 0.15, 1
    bezier = easeInExpo,0.7, 0, 0.84, 0

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeInOutCirc
    animation = windows, 1, 4.49, easeInOutCirc
    animation = windowsIn, 1, 3.85, easeInOutExpo, popin 90%
    animation = windowsOut, 1, 1.80, easeInOutExpo, popin 90%
    animation = windowsMove, 1, 6.5, easeOutExpo
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutExpo
    animation = layersIn, 1, 4, easeOutExpo, fade
    animation = layersOut, 1, 1.5, easeOutExpo, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 2, easeInOutExpo, slidefade 90%
    animation = workspacesIn, 1, 3.01, easeInOutExpo, slidefade 90%
    animation = workspacesOut, 1, 3.74, easeInOutExpo, slidefade 90%
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:5, gapsin:1
workspace = f[1], gapsout:5, gapsin:1
windowrule {
  name = windowrule-1
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = windowrule-2
  border_size = 0
  rounding = 0
  match:float = 0
  match:workspace = f[1]
}


# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 2 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    always_follow_on_dnd = 1
    anr_missed_pings = 5
    vfr = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    follow_mouse_threshold = 1
    mouse_refocus = 1

    accel_profile = flat
    sensitivity = -0.865 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = false

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe_touch = false
    workspace_swipe_distance = 400
}

gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = ugreen-mouse-1
    sensitivity = -0.865
    scroll_factor = 1.45
}

device {
    name = asue1201:00-04f3:3125-touchpad
    sensitivity = 0.4
    accel_profile = flat
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $browser
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, wlogout
bind = $mainMod SHIFT, M, exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, wofi --show run --term alacritty
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod SHIFTh, J, layoutmsg, swapsplit
bind = $mainMod, W, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, W, exec, waybar
bind = $mainMod CTRL, W, exec, killall -SIGUSR2 waybar
bind = $mainMod, T, fullscreen, 1
bind = $mainMod CTRL, T, fullscreen, 0
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, B, exec, hyprctl hyprsunset temperature 3000
bind = $mainMod SHIFT, B, exec, hyprctl hyprsunset identity 
bind = ALT SHIFT, Z, exec, hyprpicker -a
bind = $mainMod, ESCAPE, exec, hyprctl kill

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, mouse:276, workspace, e+1
bind = $mainMod, mouse:275, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume=5
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume=-5
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness=+5
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness=-5

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot a window
bind = $altMod, PRINT, exec, killall -SIGUSR1 hyprshot & hyprshot -m window -o ~/Pictures/Screenshots -z
# Screenshot a monitor
bind = , PRINT, exec, killall -SIGUSR1 hyprshot & hyprshot -m active -m output -o ~/Pictures/Screenshots -z
# Screenshot a region
bind = $ctrlMod, PRINT, exec, killall -SIGUSR1 hyprshot & hyprshot -m region -o ~/Pictures/Screenshots -z

# OCR
bind = ALT SHIFT, X, exec, ~/scripts/ocr.sh

bind = $mainMod ALT, G, exec, ~/.config/hypr/gamemode.sh
bind = $mainMod CTRL, R, exec, ~/.config/hypr/screenrec.sh

bind = $mainMod CTRL, V, exec, cliphist list | wofi -S dmenu | cliphist decode | wl-copy
bind = $mainMod, PERIOD, exec, wofi-emoji

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
#windowrule = float,class:^(alacritty)$,title:^(alacritty)$

windowrule {
  name = windowrule-3
  float = on
  pin = on
  keep_aspect_ratio = on
  match:class = ^(waterfox)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = nautiluspreview
  float = on
  match:class = ^(org.gnome.NautilusPreviewer)$
}

# Ignore maximize requests from apps. You'll probably like this.
#windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule {
  name = windowrule-4
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


windowrule {
  name = windowrule-5
  no_initial_focus = on
  opacity = 0.9 0.9
  match:class = ^(wine-.*)
}


xwayland{
create_abstract_socket = true
}

render{
xp_mode = false
}

# Disabling that thing that bugged me from dragging anything in Photoshop
windowrule {
  name = windowrule-6
  no_initial_focus = on
  float = on
  no_blur = on
  match:float = 1
  match:initial_class = ^(photoshop.exe)$
}


# The one above but for everything now because i also encountered that in Audacity aswell lmao
windowrule {
  name = windowrule-7
  no_initial_focus = on
  float = on
  match:float = 1
  match:initial_class = .*
}


windowrule {
  name = windowrule-8
  float = on
  match:class = ^(xdg-desktop-portal-gtk)$
  match:initial_class = ^(xdg-desktop-portal-gtk)$
}

windowrule {
  name = pulsevis
  match:class = .*pulse.*
  match:class = .*pulse-visualizer.*
  size = 1280 200
  pseudo = on
  tile = on
  keep_aspect_ratio = on
}

layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.5
  match:namespace = logout_dialog
}


layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0.5
  match:namespace = waybar
}

#layerrule = ignorealpha 0.5, waybar

layerrule {
  name = layerrule-3
  blur = on
  ignore_alpha = 0.5
  match:namespace = wofi
}


layerrule {
  name = layerrule-4
  blur = on
  ignore_alpha = 0.5
  match:namespace = dunst
}


debug:full_cm_proto = true
