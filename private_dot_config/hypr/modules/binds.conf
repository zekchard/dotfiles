#    See https://wiki.hypr.land/Configuring/Binds/

$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, exec, $browser
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, wlogout
bind = $mainMod SHIFT, M, exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, wofi --show run --term alacritty
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod CTRL, V, exec, cliphist list | wofi -S dmenu | cliphist decode | wl-copy
bind = $mainMod, PERIOD, exec, wofi-emoji
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod SHIFT, J, layoutmsg, swapsplit
bind = $mainMod, W, exec, killall -SIGUSR1 waybar
bind = $mainMod SHIFT, W, exec, waybar
bind = $mainMod CTRL, W, exec, killall -SIGUSR2 waybar
bind = $mainMod, T, fullscreen, 1
bind = $mainMod CTRL, T, fullscreen, 0
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, B, exec, wlsunset -l 13.6 -L 121.1 -t 3700
bind = $mainMod SHIFT, B, exec, hyprctl hyprsunset identity 
bind = ALT SHIFT, Z, exec, hyprpicker -a
bind = $mainMod, ESCAPE, exec, hyprctl kill
bind = $mainMod, N, exec, swaync-client -t -sw

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bind = $mainMod, mouse:276, workspace, e+1
bind = $mainMod, mouse:275, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume=5
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume=-5
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness=+5
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness=-5

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Hyprshot
# Screenshot a window
bind = $altMod, PRINT, exec, pkill hyprshot & hyprshot -m window -o ~/Pictures/Screenshots -z
# Screenshot a monitor
bind = , PRINT, exec, pkill hyprshot & hyprshot -m active -m output -o ~/Pictures/Screenshots -z
# Screenshot a region
bind = $ctrlMod, PRINT, exec, pkill hyprshot & hyprshot -m region -o ~/Pictures/Screenshots -z

# Scripts
bind = ALT SHIFT, X, exec, ~/.config/hypr/scripts/ocr.sh
bind = $mainMod ALT, G, exec, ~/.config/hypr/scripts/gamemode.sh
bind = $mainMod CTRL, R, exec, ~/.config/hypr/scripts/screenrec.sh
