# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

################
# Window Rules #
################

windowrule {
  name = smart-gaps1
  border_size = 2
  rounding = 5
  border_color = rgba($background,0.8)
  match:float = 0
  match:workspace = w[tv1]
}

windowrule {
  name = smart-gaps2
  border_size = 2
  border_color = rgba($background,0.8)
  rounding = 5
  match:float = 0
  match:workspace = f[1]
}

windowrule {
  name = pip
  float = on
  pin = on
  keep_aspect_ratio = on
  match:class = ^(waterfox)$
  match:title = ^(Picture-in-Picture)$
}

windowrule {
  name = nautiluspreview
  float = on
  match:class = ^(org.gnome.NautilusPreviewer)$
}

# Fix some dragging issues with XWayland
windowrule {
  name = xwayland
  no_focus = on
  match:class = ^$
  match:title = ^$
  match:xwayland = 1
  match:float = 1
  match:fullscreen = 0
  match:pin = 0
}


windowrule {
  name = windowrule-5
  no_initial_focus = on
  opacity = 0.9 0.9
  match:class = ^(wine-.*)
}

# Disabling that thing that bugged me from dragging anything in Photoshop
windowrule {
  name = dragps
  no_initial_focus = on
  float = on
  no_blur = on
  match:float = 1
  match:initial_class = ^(photoshop.exe)$
}

# The one above but for everything now because i also encountered that in Audacity aswell lmao
windowrule {
  name = dragall
  no_initial_focus = on
  float = on
  match:float = 1
  match:initial_class = .*
}

windowrule {
  name = portal
  float = on
  match:class = ^(xdg-desktop-portal-gtk)$
  match:initial_class = ^(xdg-desktop-portal-gtk)$
}

windowrule {
  name = pulsevis
  match:class = .*pulse.*
  match:class = .*pulse-visualizer.*
  size = 1280 200
  pseudo = on
  tile = on
  keep_aspect_ratio = on
}

###############
# Layer Rules #
###############

layerrule {
  name = wlogout
  blur = on
  animation = popin 102%
  match:namespace = logout_dialog
}


layerrule {
  name = waybar
  blur = on
  match:namespace = waybar
}

layerrule {
  name = wofi
  blur = on
  animation = popin 102%
  match:namespace = wofi
}

layerrule {
  name = swaync
  blur = on
  ignore_alpha = 0.5
  animation = slideFade right
  match:namespace = swaync-notification-window
  }
  
layerrule {
  name = swaync2
  blur = on
  ignore_alpha = 0.5
  animation = slideFade right
  match:namespace = swaync-control-center
  }

