
[general]
import = ["colors.toml"]

[window]
opacity = 0.9
blur = true

[cursor]
style = { 
shape = "Beam",
blinking = "always" }
thickness = 0.32

[font]
normal = { family = "AnonymicePro Nerd Font Propo", style = "Regular" }
bold = { family = "AnonymicePro Nerd Font Propo", style = "Bold" }
italic = { family = "AnonymicePro Nerd Font Propo", style = "Italic" }
bold_italic = { family = "AnonymicePro Nerd Font Propo", style = "Bold Italic" }
offset = { x = 0, y = 0 }
size = 11

