[Settings]
language = en
backend = awww
folder = ~/Pictures/wallpaper
monitors = All
wallpaper = ~/Pictures/wallpaper/wallpuccin/self/DCP_5903(1).png
show_path_in_tooltip = True
fill = fill
sort = name
color = #ffffff
subfolders = True
all_subfolders = True
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = matugen --source-color-index 0 -t scheme-tonal-spot image "$wallpaper" && notify-send Matugen "Colors sucessfully changed.
	Current color: $(cat ~/.config/matugen/current-color)"
number_of_columns = 3
swww_transition_type = outer
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = null
keybindings = ~/.config/waypaper/keybindings.ini
wallpaperengine_folder = ~/.steam/root/steamapps/workshop/content/431960
linux_wallpaperengine_clamp = none
linux_wallpaperengine_volume = 15
linux_wallpaperengine_silent = False
linux_wallpaperengine_noautomute = False
linux_wallpaperengine_no_audio_processing = False
linux_wallpaperengine_fps = 30
linux_wallpaperengine_disable_particles = True
linux_wallpaperengine_disable_mouse = False
linux_wallpaperengine_disable_parallax = False
linux_wallpaperengine_no_fullscreen_pause = False
waypaperd_cycle_length = 1800
slideshow_interval = 60
slideshow_enabled = False
show_slideshow_panel = False
swww_filter = Bilinear

